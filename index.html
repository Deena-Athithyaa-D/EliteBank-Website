<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EliteBank</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="nav">
      <h3>Login,to get started</h3>
      <img src="assets/logo.png" alt="" />
      <input type="text" placeholder="id" class="input-name input" />
      <input type="password" placeholder="pin" class="input-pin input" />
    </nav>
    <div class="app">
      <div class="balance">
        <div class="balance-left">
          <h1>Current Balance </h1>
          <br />
          <h2 class="date">As of Sunday</h2>
        </div>

        <p class="balance-amount">2500₹</p>
      </div>
      <div class="money">
      <div class="transactions">
        <div class="transactions-row">
          <div class="trasaction-deposit">1 deposit</div>
          <div class="transactions-date">25/2/2024</div>
          <div>8000₹</div>
        </div>
        <div class="transactions-row">
          <div class="trasaction-withdrawal">1 deposit</div>
          <div class="transactions-date">25/2/2024</div>
          <div>-800₹</div>
        </div
      </div>
      <div class="transfer-money"></div>
    </div>
    </div>
  </body>
</html>
