<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EliteBank</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="nav">
      <h3>Login,to get started</h3>
      <img src="assets/logo.png" alt="" />
      <form action="" class="login-form">
        <input type="text" placeholder="&nbsp;id" class="input-name input" />
        <input
          type="password"
          placeholder="&nbsp;pin"
          class="input-pin input"
        /><button class="arrow-btn login-btn">&rarr;</button>
      </form>
    </nav>
    <div class="app">
      <div class="balance">
        <div class="balance-left">
          <h1>Current Balance</h1>
          <br />
          <h2 class="date">As of Sunday</h2>
        </div>

        <p class="balance-amount">2500₹</p>
      </div>
      <div class="money">
        <div class="transactions">
          <div class="transactions-row">
            <div class="transactions-deposit">1 deposit</div>
            <div class="transactions-date">25/2/2024</div>
            <div class="transactions-money">8000₹</div>
          </div>
          <div class="transactions-row">
            <div class="transactions-withdrawal">2 withdrawal</div>
            <div class="transactions-date">25/2/2024</div>
            <div class="transactions-money">-800₹</div>
          </div>
        </div>


        <div class="transfer-money">
          <h2>Transfer Money</h2>
          <form action="">
            <input
              type="text"
              placeholder="&nbsp;id"
              class="transfer-money-id input"
            />
            <input
              type="number"
              placeholder="&nbsp;amount"
              class="transfer-money-amount input"
            /><button class="arrow-btn trasnfer-money-btn">&rarr;</button>
          </form>
        </div>
        <div class="transfer-money loan">
          <h2>Request Loan</h2>
          <form action="" class="loan-form">
            <input
              type="number"
              class="input loan-amount"
              placeholder="loan amount"
            />
            <button class="arrow-btn loan-btn">&rarr;</button>
          </form>
        </div>
        <div class="transfer-money delete-account">
          <h2>Delete Account</h2>
          <form action="" class="da-form">
            <input type="text" placeholder="&nbsp;id" class="da-id input" />
            <input
              type="number"
              placeholder="&nbsp;amount"
              class="da-pin input"
            /><button class="arrow-btn da-btn">&rarr;</button>
          </form>
        </div>
        <div class="summary">
          <div class="summary-in">
            <p class="summary-in-value">7300₹</p>
            IN
          </div>
          <div class="summary-out">
            <p class="summary-out-value">800₹</p>
            OUT
          </div>
          <div class="sumamry-int">
            <p class="sumamry-int-value">8₹</p>
            Intreset
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
